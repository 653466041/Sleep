<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nature Sounds - Lullaby Mist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#221b00",
                        "surface": "#faf9f6",
                        "on-surface": "#1a1c1a",
                        "error-container": "#ffdad6",
                        "primary-container": "#7da8d8",
                        "on-primary-fixed-variant": "#174974",
                        "inverse-surface": "#2f312f",
                        "outline-variant": "#c2c7d0",
                        "on-primary": "#ffffff",
                        "surface-bright": "#faf9f6",
                        "primary-fixed-dim": "#9fcafc",
                        "secondary-container": "#f6e29e",
                        "surface-tint": "#34618d",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#72632c",
                        "on-primary-fixed": "#001d35",
                        "tertiary-fixed-dim": "#e7bbc6",
                        "secondary-fixed-dim": "#d9c684",
                        "primary": "#34618d",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#d0e4ff",
                        "tertiary-container": "#c39aa4",
                        "error": "#ba1a1a",
                        "tertiary": "#78555e",
                        "surface-variant": "#e3e2e0",
                        "surface-container-highest": "#e3e2e0",
                        "on-tertiary-container": "#50323b",
                        "on-secondary-fixed-variant": "#534611",
                        "surface-container-high": "#e9e8e5",
                        "surface-container": "#efeeeb",
                        "on-tertiary-fixed-variant": "#5e3e47",
                        "on-tertiary-fixed": "#2d141c",
                        "tertiary-fixed": "#ffd9e2",
                        "secondary-fixed": "#f6e29e",
                        "on-primary-container": "#003d67",
                        "on-error": "#ffffff",
                        "surface-dim": "#dbdad7",
                        "secondary": "#6c5d27",
                        "background": "#faf9f6",
                        "surface-container-low": "#f4f3f1",
                        "on-background": "#1a1c1a",
                        "inverse-on-surface": "#f2f1ee",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#42474e",
                        "inverse-primary": "#9fcafc",
                        "outline": "#72777f"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "margin": "20px",
                        "md": "16px",
                        "gutter": "16px",
                        "xl": "40px",
                        "sm": "8px",
                        "lg": "24px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "body-md": ["Be Vietnam Pro"],
                        "label-lg": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-lg": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "display": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            -webkit-tap-highlight-color: transparent;
        }
        
        .ambient-shadow-base {
            box-shadow: 0 4px 20px rgba(52, 97, 141, 0.04);
        }
        
        .ambient-shadow-float {
            box-shadow: 0 8px 30px rgba(52, 97, 141, 0.08);
        }

        .active-track {
            background-color: theme('colors.primary-fixed');
            color: theme('colors.on-primary-fixed');
        }
        
        .active-track .icon-bg {
            background-color: theme('colors.on-primary');
            color: theme('colors.primary');
        }

        /* Material Symbols adjustments for thicker, rounded look */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
            border-radius: 9999px; /* Ensure rounded terminals in custom icons if possible, standard MS is limited but this hints intent */
        }
        
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen flex flex-col pb-32">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface text-primary dark:text-primary-fixed-dim font-headline-md text-headline-md docked full-width top-0 flat no shadows flex items-center justify-between px-margin w-full h-16 sticky z-40 pt-safe">
<button aria-label="Go back" class="w-12 h-12 flex items-center justify-center rounded-full opacity-80 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[28px]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="flex-1 text-center font-display text-headline-md mr-12 tracking-tight">自然之声</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin pt-4 pb-24 flex flex-col gap-sm max-w-2xl mx-auto w-full">
<!-- Track List Item 1 -->
<button class="w-full bg-surface-container-lowest ambient-shadow-base rounded-lg p-4 flex items-center gap-4 active:scale-[0.98] transition-transform duration-200 text-left active-track group">
<div class="w-14 h-14 rounded-full icon-bg flex items-center justify-center flex-shrink-0 transition-colors duration-300">
<span class="material-symbols-outlined text-[28px]" data-icon="rainy">rainy</span>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-md text-headline-md text-on-surface truncate mb-1">轻柔雨声</h3>
<p class="font-body-md text-label-sm text-on-surface-variant truncate">45:00 • 舒缓自然</p>
</div>
<div class="w-10 h-10 rounded-full bg-surface text-primary flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined filled text-[24px]" data-icon="pause">pause</span>
</div>
</button>
<!-- Track List Item 2 -->
<button class="w-full bg-surface-container-lowest ambient-shadow-base rounded-lg p-4 flex items-center gap-4 active:scale-[0.98] transition-transform duration-200 text-left group hover:bg-surface-container-low">
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center flex-shrink-0 text-primary transition-colors duration-300 group-hover:bg-primary-fixed group-hover:text-on-primary-fixed">
<span class="material-symbols-outlined text-[28px]" data-icon="waves">waves</span>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-md text-headline-md text-on-surface truncate mb-1">深海海浪</h3>
<p class="font-body-md text-label-sm text-on-surface-variant truncate">60:00 • 规律白噪音</p>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-low text-on-surface-variant flex items-center justify-center flex-shrink-0 group-hover:text-primary">
<span class="material-symbols-outlined text-[24px]" data-icon="play_arrow">play_arrow</span>
</div>
</button>
<!-- Track List Item 3 -->
<button class="w-full bg-surface-container-lowest ambient-shadow-base rounded-lg p-4 flex items-center gap-4 active:scale-[0.98] transition-transform duration-200 text-left group hover:bg-surface-container-low">
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center flex-shrink-0 text-primary transition-colors duration-300 group-hover:bg-primary-fixed group-hover:text-on-primary-fixed">
<span class="material-symbols-outlined text-[28px]" data-icon="air">air</span>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-md text-headline-md text-on-surface truncate mb-1">林间风鸣</h3>
<p class="font-body-md text-label-sm text-on-surface-variant truncate">30:00 • 微风拂叶</p>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-low text-on-surface-variant flex items-center justify-center flex-shrink-0 group-hover:text-primary">
<span class="material-symbols-outlined text-[24px]" data-icon="play_arrow">play_arrow</span>
</div>
</button>
<!-- Track List Item 4 -->
<button class="w-full bg-surface-container-lowest ambient-shadow-base rounded-lg p-4 flex items-center gap-4 active:scale-[0.98] transition-transform duration-200 text-left group hover:bg-surface-container-low">
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center flex-shrink-0 text-primary transition-colors duration-300 group-hover:bg-primary-fixed group-hover:text-on-primary-fixed">
<span class="material-symbols-outlined text-[28px]" data-icon="forest">forest</span>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-md text-headline-md text-on-surface truncate mb-1">夏夜虫鸣</h3>
<p class="font-body-md text-label-sm text-on-surface-variant truncate">45:00 • 宁静乡村</p>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-low text-on-surface-variant flex items-center justify-center flex-shrink-0 group-hover:text-primary">
<span class="material-symbols-outlined text-[24px]" data-icon="play_arrow">play_arrow</span>
</div>
</button>
<!-- Track List Item 5 -->
<button class="w-full bg-surface-container-lowest ambient-shadow-base rounded-lg p-4 flex items-center gap-4 active:scale-[0.98] transition-transform duration-200 text-left group hover:bg-surface-container-low">
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center flex-shrink-0 text-primary transition-colors duration-300 group-hover:bg-primary-fixed group-hover:text-on-primary-fixed">
<span class="material-symbols-outlined text-[28px]" data-icon="water_drop">water_drop</span>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-md text-headline-md text-on-surface truncate mb-1">山间溪流</h3>
<p class="font-body-md text-label-sm text-on-surface-variant truncate">无限 • 持续流水</p>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-low text-on-surface-variant flex items-center justify-center flex-shrink-0 group-hover:text-primary">
<span class="material-symbols-outlined text-[24px]" data-icon="play_arrow">play_arrow</span>
</div>
</button>
</main>
<!-- Floating Mini Player -->
<div class="fixed bottom-6 left-0 w-full px-margin z-50 flex justify-center pointer-events-none">
<div class="w-full max-w-md bg-white/85 backdrop-blur-xl ambient-shadow-float rounded-full p-2 pl-4 pr-3 flex items-center justify-between pointer-events-auto border border-white/40">
<div class="flex items-center gap-3 flex-1 min-w-0">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center flex-shrink-0 text-primary">
<span class="material-symbols-outlined text-[20px]" data-icon="rainy">rainy</span>
</div>
<div class="flex-1 min-w-0 flex flex-col justify-center">
<span class="font-label-lg text-label-lg text-on-surface truncate block">轻柔春雨</span>
<span class="font-label-sm text-label-sm text-primary opacity-80 block truncate">播放中...</span>
</div>
</div>
<div class="flex items-center gap-1 flex-shrink-0">
<button aria-label="Set timer" class="w-12 h-12 flex items-center justify-center rounded-full text-on-surface-variant hover:text-primary active:scale-95 transition-all">
<span class="material-symbols-outlined text-[24px]" data-icon="schedule">schedule</span>
</button>
<button aria-label="Pause" class="w-12 h-12 flex items-center justify-center rounded-full bg-primary text-on-primary active:scale-95 transition-transform shadow-sm">
<span class="material-symbols-outlined filled text-[24px]" data-icon="pause">pause</span>
</button>
</div>
</div>
</div>
</body></html>
